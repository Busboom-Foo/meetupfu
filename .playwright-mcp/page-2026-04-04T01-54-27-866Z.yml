        - paragraph [ref=e30]: Students experiment with LEDs, sensors, and radio communications to see how code controls physical hardware.
      - generic [ref=e32]: Micro:bit image
    - generic [ref=e34]:
      - generic [ref=e35]:
        - generic [ref=e36]:
          - heading "Course Overview" [level=2] [ref=e37]
          - paragraph [ref=e38]: Hour of Micro:bit is a gentle introduction to physical computing using the BBC Micro:bit, a pocket-sized programmable computer. In this short workshop, students write programs to control the Micro:bit’s LED display, buttons, sensors, and radio communication capabilities. The Micro:bit’s approachable interface and immediate physical feedback make it perfect for beginners to understand how code controls hardware. This course serves as both a standalone introduction to microcontrollers and as preparation for our more advanced robotics courses. Students leave with a concrete understanding of how programming translates to real-world actions.
